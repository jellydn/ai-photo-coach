<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Photo Coach - Brand Assets Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
      background: #0D0D0D;
      color: #FFFFFF;
      margin: 0;
      padding: 40px 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #999;
      font-size: 16px;
      margin-bottom: 40px;
    }
    h2 {
      font-size: 20px;
      font-weight: 500;
      margin: 40px 0 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
    }
    .section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }
    .card {
      background: #1A1A1A;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
    }
    .card h3 {
      font-size: 14px;
      font-weight: 500;
      color: #999;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card svg {
      max-width: 100%;
      height: auto;
    }
    .splash-preview {
      background: #1A1A1A;
      border-radius: 16px;
      overflow: hidden;
      margin: 0 auto;
    }
    .splash-preview.phone {
      max-width: 375px;
    }
    .splash-preview.tablet {
      max-width: 600px;
    }
    .colors {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }
    .color-swatch {
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .color-swatch span {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.3);
      padding: 4px 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 AI Photo Coach</h1>
    <p class="subtitle">Brand Assets & Design System</p>

    <h2>Logo Variants</h2>
    <div class="section">
      <div class="card">
        <h3>Full Logo (120×120)</h3>
        <svg viewBox="0 0 120 120" width="200" height="200">
          <circle cx="60" cy="60" r="56" fill="#0D0D0D"/>
          <circle cx="60" cy="60" r="52" stroke="url(#g1)" stroke-width="2"/>
          <circle cx="60" cy="60" r="36" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
          <circle cx="60" cy="60" r="28" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.6"/>
          <path d="M60 32 L66 44 L60 56 L54 44 Z" fill="#FFD700" opacity="0.9"/>
          <path d="M78 42 L72 54 L60 54 L66 42 Z" fill="#FFD700" opacity="0.7"/>
          <path d="M78 60 L66 60 L60 48 L72 48 Z" fill="#FFD700" opacity="0.5"/>
          <path d="M66 76 L60 64 L54 76 L60 88 Z" fill="#FFD700" opacity="0.9"/>
          <path d="M48 76 L42 64 L54 64 L60 76 Z" fill="#FFD700" opacity="0.7"/>
          <path d="M42 60 L54 60 L60 72 L48 72 Z" fill="#FFD700" opacity="0.5"/>
          <line x1="36" y1="24" x2="36" y2="96" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
          <line x1="84" y1="24" x2="84" y2="96" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
          <line x1="24" y1="36" x2="96" y2="36" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
          <line x1="24" y1="84" x2="96" y2="84" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
          <circle cx="60" cy="60" r="4" fill="#00D26A"/>
          <line x1="60" y1="52" x2="60" y2="56" stroke="#00D26A" stroke-width="1.5"/>
          <line x1="60" y1="64" x2="60" y2="68" stroke="#00D26A" stroke-width="1.5"/>
          <line x1="52" y1="60" x2="56" y2="60" stroke="#00D26A" stroke-width="1.5"/>
          <line x1="64" y1="60" x2="68" y2="60" stroke="#00D26A" stroke-width="1.5"/>
          <defs>
            <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FFD700"/>
              <stop offset="50%" stop-color="#FFA500"/>
              <stop offset="100%" stop-color="#00D26A"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <div class="card">
        <h3>App Icon (60×60)</h3>
        <svg viewBox="0 0 60 60" width="200" height="200">
          <rect width="60" height="60" rx="14" fill="#0D0D0D"/>
          <circle cx="30" cy="30" r="20" stroke="#FFFFFF" stroke-width="2" fill="none"/>
          <circle cx="30" cy="30" r="14" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.5"/>
          <circle cx="30" cy="30" r="8" fill="#FFD700"/>
          <line x1="20" y1="30" x2="24" y2="30" stroke="#0D0D0D" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="36" y1="30" x2="40" y2="30" stroke="#0D0D0D" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="30" y1="20" x2="30" y2="24" stroke="#0D0D0D" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="30" y1="36" x2="30" y2="40" stroke="#0D0D0D" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M46 14 Q52 14 52 20" stroke="#00D26A" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <h2>Splash Screens</h2>

    <h3>Mobile Portrait</h3>
    <div class="splash-preview phone">
      <svg viewBox="0 0 375 812" width="100%" preserveAspectRatio="xMidYMid slice">
        <rect width="375" height="812" fill="url(#bg1)"/>
        <g opacity="0.03">
          <line x1="125" y1="0" x2="125" y2="812" stroke="#FFFFFF" stroke-width="1"/>
          <line x1="250" y1="0" x2="250" y2="812" stroke="#FFFFFF" stroke-width="1"/>
          <line x1="0" y1="271" x2="375" y2="271" stroke="#FFFFFF" stroke-width="1"/>
          <line x1="0" y1="541" x2="375" y2="541" stroke="#FFFFFF" stroke-width="1"/>
        </g>
        <g transform="translate(127.5, 326)">
          <circle cx="60" cy="60" r="58" fill="#FFD700" opacity="0.08"/>
          <circle cx="60" cy="60" r="54" fill="#FFD700" opacity="0.05"/>
          <circle cx="60" cy="60" r="50" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
          <circle cx="60" cy="60" r="46" stroke="url(#g2)" stroke-width="2"/>
          <circle cx="60" cy="60" r="32" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
          <circle cx="60" cy="60" r="24" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.6"/>
          <path d="M60 36 L65 46 L60 56 L55 46 Z" fill="#FFD700" opacity="0.9"/>
          <path d="M76 44 L71 54 L60 54 L65 44 Z" fill="#FFD700" opacity="0.7"/>
          <path d="M76 60 L65 60 L60 50 L71 50 Z" fill="#FFD700" opacity="0.5"/>
          <path d="M65 74 L60 64 L55 74 L60 84 Z" fill="#FFD700" opacity="0.9"/>
          <path d="M49 74 L44 64 L55 64 L60 74 Z" fill="#FFD700" opacity="0.7"/>
          <path d="M44 60 L55 60 L60 70 L49 70 Z" fill="#FFD700" opacity="0.5"/>
          <line x1="36" y1="20" x2="36" y2="100" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
          <line x1="84" y1="20" x2="84" y2="100" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
          <line x1="20" y1="36" x2="100" y2="36" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
          <line x1="20" y1="84" x2="100" y2="84" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
          <circle cx="60" cy="60" r="4" fill="#00D26A"/>
        </g>
        <text x="187.5" y="440" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF">Photo Coach</text>
        <text x="187.5" y="470" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="400" fill="#999999">AI-Powered Photography Guide</text>
        <defs>
          <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0D0D0D"/>
            <stop offset="50%" stop-color="#1A1A1A"/>
            <stop offset="100%" stop-color="#0D0D0D"/>
          </linearGradient>
          <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD700"/>
            <stop offset="50%" stop-color="#FFA500"/>
            <stop offset="100%" stop-color="#00D26A"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <h2>Color Palette</h2>
    <div class="colors">
      <div class="color-swatch" style="background: #0D0D0D;"><span>#0D0D0D</span></div>
      <div class="color-swatch" style="background: #1A1A1A;"><span>#1A1A1A</span></div>
      <div class="color-swatch" style="background: #FFD700; color: #000;"><span>#FFD700</span></div>
      <div class="color-swatch" style="background: #00D26A;"><span>#00D26A</span></div>
      <div class="color-swatch" style="background: #FFFFFF; color: #000;"><span>#FFFFFF</span></div>
      <div class="color-swatch" style="background: #999999;"><span>#999999</span></div>
    </div>
  </div>
</body>
</html>
